name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: opencode ${{ matrix.opencode-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        opencode-version: ["1.17.4", "latest"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install opencode
        run: npm install --global opencode-ai@${{ matrix.opencode-version }}

      - name: Show versions
        run: |
          bun --version
          opencode --version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test
